<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volunteer Bridge | Register</title>
    <link rel="stylesheet" href="/frontend/css/colors.css" />
    <link rel="stylesheet" href="/frontend/css/admin/admin-signup.css" />
    <script src="/frontend/javascript/admin/admin-signup.js" defer></script>
  </head>

  <body>
    <div class="auth-wrapper">
      <div class="auth-card">
        <!-- HERO SIDE -->

         <div id="toast-container"></div>

        <div class="hero-card">
          <img
            src="/frontend/assets/Welcome Screen Desktop.png"
            alt="Volunteer Bridge"
          />

          <div class="hero-content">

              <img class="logo" src="/frontend/assets/icons/Logo.png" alt="Volunteer_Bridge_LOgo">

            <h1>Volunteer <span>Bridge</span></h1>

            <p>Empowering communities better organization</p>
          </div>
        </div>

        <div class="login-card">
          <h2>Create Account</h2>

          <form id="admin-signup-form" class="adminSignupForm">
            <div class="input-group">
              <label>Name of Organisation/NGO</label>
              <input
                type="text"
                id="name"
                placeholder="Enter the name of your organisation or NGO"
                required
              />
            </div>

            <div class="input-group">
              <label>Email</label>
              <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required
              />
            </div>

            <div class="input-group">
              <label>Phone Number</label>
              <input
                type="tel"
                id="phone_number"
                placeholder="Enter your phone number"
              />
            </div>

            <div class="input-group">
              <label>Address</label>
              <input
                type="text"
                id="address"
                placeholder="Enter your address"
              />
            </div>

            <div class="input-group password-group">
              <label>Password</label>
              <input
                type="password"
                id="password"
                placeholder="Create your password"
                required
              />
              <span class="toggle-password"
                ><img src="/frontend/assets/icons/eye.svg" alt="eyeicon"
              /></span>

            </div>

            <button type="submit" class="login-btn">Create Account</button>

            <button type="button" class="google-btn">
              <img
                src="https://cdn-icons-png.flaticon.com/512/281/281764.png"
                alt=""
              />
              Sign up with Google
            </button>

            <p class="signup-text">
              Already have an account?
              <a href="admin-login.html">Login</a>
            </p>
            <p id="error-message" style="color: red"></p>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
