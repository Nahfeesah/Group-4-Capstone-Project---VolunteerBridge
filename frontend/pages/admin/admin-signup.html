<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Bridge | Register</title>
<link rel="stylesheet" href="/frontend/css/colors.css">
<link rel="stylesheet" href="/frontend/css/admin/admin-signup.css">
<script src="/frontend/javascript/admin-signup.js" defer></script>

</head>

<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <!-- HERO SIDE -->

        <div class="hero-card">

            <img src="/frontend/assets/Welcome Screen Desktop.png" alt="Volunteer Bridge">

            <div class="hero-content">

                <h1>Volunteer <span>Bridge</span></h1>

                <p>
                    Empowering communities better organization
                </p>

            </div>

        </div>


       

        <div class="login-card">

            <h2>Create Account</h2>

            <form>

                <div class="input-group">
                    <label>Name of Organisation/NGO
                    </label>
                    <input type="text" placeholder="Enter the name of your organisation or NGO">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter your phone number">
                </div>
                <div class="input-group">
                    <label>Address</label>
                    <input type="text" placeholder="Enter your address">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create your password">
                </div>

                <button class="login-btn">Create Account</button>

                <button type="button" class="google-btn">
                    <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="">
                    Sign up with Google
                </button>

                <p class="signup-text">
                    Already have an account?
                    <a href="admin-login.html">Login</a>
                </p>

            </form>

        </div>

    </div>

</div>

</body>

</html>
