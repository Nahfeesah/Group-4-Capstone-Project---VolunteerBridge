<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Bridge | Login</title>

<link rel="stylesheet" href="/frontend/css/colors.css">
<link rel="stylesheet" href="/frontend/css/admin/admin-login.css">

</head>

<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <!-- HERO SIDE -->

        <div class="hero-card">

            <img src="/frontend/assets/Welcome Screen Desktop.png" alt="Volunteer Bridge">

            <div class="hero-content">
                <h1>Volunteer <span>Bridge</span></h1>

                <p>
                    Empowering communities better organization
                </p>
            </div>

        </div>


        <!-- LOGIN SIDE -->

        <div class="login-card">

            <h2>Login</h2>

            <form>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password">
                </div>

                <button class="login-btn">Login</button>

                <button type="button" class="google-btn">
                    <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="">
                    Continue with Google
                </button>

                <p class="signup-text">
                    Don't have an account?
                    <a href="admin-signup.html">Sign up</a>
                </p>

            </form>

        </div>

    </div>

</div>

</body>

</html>
